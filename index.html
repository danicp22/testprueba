<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Quiz interactivo</title>
<style>
:root{--bg:#f0f4f8;--card:#ffffff;--accent:#0ea5a4;--muted:#6b7280;--ok:#16a34a;--bad:#ef4444}
html,body{height:100%;margin:0;font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial}
body{background:var(--bg);color:#072128;display:flex;align-items:flex-start;justify-content:center;padding:18px}
.wrap{width:100%;max-width:820px}
header{display:flex;gap:12px;align-items:center;margin-bottom:14px}
.brand{background:linear-gradient(90deg,var(--accent),#7c3aed);padding:10px 14px;border-radius:12px;font-weight:700;color:white}
.card{background:var(--card);padding:16px;border-radius:14px;box-shadow:0 6px 18px rgba(15,23,42,0.06);margin-bottom:12px}
.question{padding:12px;border-radius:10px;margin-bottom:10px;background:rgba(2,6,23,0.02)}
h1{font-size:20px;margin:0}
.choices{display:flex;flex-direction:column;gap:8px;margin-top:8px}
label.choice{display:flex;gap:10px;align-items:flex-start;padding:10px;border-radius:10px;border:1px solid rgba(2,6,23,0.04);cursor:pointer}
input[type=radio]{margin-top:3px}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
button{background:var(--accent);border:none;padding:10px 12px;border-radius:10px;color:white;font-weight:700;cursor:pointer}
button.ghost{background:transparent;color:var(--accent);border:1px solid rgba(2,6,23,0.04)}
.summary{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.chip{padding:8px 10px;border-radius:999px;background:rgba(2,6,23,0.03);font-weight:700}
.correct{border-left:5px solid var(--ok)}
.incorrect{border-left:5px solid var(--bad)}
footer{margin-top:10px;color:var(--muted);font-size:13px}
@media (max-width:480px){.wrap{padding:10px}.brand{padding:8px 10px}.card{padding:12px}}
</style>
</head>

<body>
<div class="wrap">
<header>
  <div class="brand">Quiz</div>
  <div><h1>Quiz interactivo</h1></div>
</header>

<main class="card" id="app">

<!-- SELECTOR -->
<div style="margin-bottom:12px">
  <label><strong>Selecciona el test:</strong></label>
  <select id="testSelector">
    <option value="1">Cultura general</option>
    <option value="2">Entretenimiento</option>
    <option value="3">Demo Frontend</option>
  </select>
</div>

<div id="quiz-area"></div>

<div class="controls">
  <button id="prevBtn" class="ghost">Anterior</button>
  <button id="nextBtn" class="ghost">Siguiente</button>
  <button id="finishBtn">Terminar</button>
  <button id="restartBtn" class="ghost">Reiniciar</button>
  <label style="margin-left:auto" class="chip">
    Preguntas: <span id="count">0</span>
  </label>
</div>

<div id="results" style="margin-top:10px;display:none" class="card"></div>
<footer>Buena suerte 🍀 </footer>
</main>
</div>

<script>
// ===== TEST 1 (Cultura general — juego) =====
const test1 = [
  {"q":"¿Cuál es el planeta más cercano al Sol?","choices":["Venus","Mercurio","Marte","Júpiter"],"answer":1},
  {"q":"¿Cuántos continentes hay en la Tierra (modelo más común)?","choices":["5","6","7","8"],"answer":2},
  {"q":"¿Quién pintó la Mona Lisa?","choices":["Pablo Picasso","Leonardo da Vinci","Van Gogh","Salvador Dalí"],"answer":1},
  {"q":"¿Cuál es el océano más grande del mundo?","choices":["Atlántico","Índico","Ártico","Pacífico"],"answer":3},
  {"q":"¿En qué país se encuentra la Torre Eiffel?","choices":["Italia","Francia","Alemania","Portugal"],"answer":1},
  {"q":"¿Cuántos días tiene un año bisiesto?","choices":["364","365","366","367"],"answer":2},
  {"q":"¿Cuál es el animal terrestre más rápido?","choices":["León","Guepardo","Caballo","Tigre"],"answer":1},
  {"q":"¿Qué idioma tiene más hablantes nativos?","choices":["Inglés","Español","Mandarín","Hindi"],"answer":2},
  {"q":"¿Cuál es el metal cuyo símbolo es Au?","choices":["Plata","Oro","Aluminio","Cobre"],"answer":1},
  {"q":"¿Qué instrumento mide la temperatura?","choices":["Barómetro","Termómetro","Higrómetro","Velocímetro"],"answer":1},
  {"q":"¿Cuántos jugadores hay en un equipo de fútbol en el campo?","choices":["9","10","11","12"],"answer":2},
  {"q":"¿Cuál es la capital de Japón?","choices":["Seúl","Pekín","Tokio","Bangkok"],"answer":2}
];

// ===== TEST 2 (Entretenimiento y curiosidades — juego) =====
const test2 = [
  {"q":"¿Qué saga tiene personajes como Frodo y Gandalf?","choices":["Harry Potter","El Señor de los Anillos","Star Wars","Narnia"],"answer":1},
  {"q":"¿Qué empresa creó el iPhone?","choices":["Samsung","Microsoft","Apple","Google"],"answer":2},
  {"q":"¿Cuál es el videojuego más vendido de la historia?","choices":["GTA V","Minecraft","Tetris","Wii Sports"],"answer":1},
  {"q":"¿Qué superhéroe es Bruce Wayne?","choices":["Iron Man","Batman","Spider‑Man","Hulk"],"answer":1},
  {"q":"¿Qué red social se caracteriza por vídeos cortos verticales y virales?","choices":["Facebook","TikTok","LinkedIn","Pinterest"],"answer":1},
  {"q":"¿Cuál es la moneda oficial de la Unión Europea en muchos países?","choices":["Dólar","Euro","Libra","Yen"],"answer":1},
  {"q":"¿Qué deporte practica Rafa Nadal?","choices":["Fútbol","Baloncesto","Tenis","Golf"],"answer":2},
  {"q":"¿Cuál es el emoji generalmente asociado al amor?","choices":["Corazón rojo","Fuego","Estrella","Rayo"],"answer":0},
  {"q":"¿Qué bebida se obtiene al moler granos tostados?","choices":["Té","Café","Cacao","Leche"],"answer":1},
  {"q":"¿Cuál es el país famoso por las pizzas y el Coliseo?","choices":["Grecia","Italia","España","Turquía"],"answer":1},
  {"q":"¿Qué aplicación se usa principalmente para enviar mensajes instantáneos en móviles?","choices":["WhatsApp","Excel","Word","Photoshop"],"answer":0},
  {"q":"¿Qué estación del año sigue al verano en el hemisferio norte?","choices":["Invierno","Primavera","Otoño","Monzón"],"answer":2}
];

// ===== TEST 3 (Demo — Frontend, preguntas de ejemplo para tu portfolio) =====
const test3 = [
  {"q":"¿Cuál de estas etiquetas HTML define un enlace?","choices":["<img>","<a>","<div>","<span>"],"answer":1},
  {"q":"¿Qué propiedad CSS cambia el color de fondo?","choices":["color","background-color","font-size","margin"],"answer":1},
  {"q":"¿Qué significa " + 'DOM' + " en desarrollo web?","choices":["Document Object Model","Data Object Method","Document Of Markup","Dynamic Object Memory"],"answer":0},
  {"q":"En JavaScript, ¿cómo se declara una constante?","choices":["let PI = 3.14;","var PI = 3.14;","const PI = 3.14;","fixed PI = 3.14;"],"answer":2},
  {"q":"¿Qué metaetiqueta ayuda a que una página sea responsive en móviles?","choices":["<meta name=\"viewport\">","<meta name=\"robots\">","<link rel=\"canonical\">","<meta charset=\"utf-8\">"],"answer":0},
  {"q":"¿Qué significa " + 'ARIA' + " en accesibilidad web?","choices":["Accessible Rich Internet Applications","Advanced Responsive Image Attributes","Automatic Reading Indexing API","Accessible Resource Interface for Apps"],"answer":0},
  {"q":"¿Cuál es el propósito de usar etiquetas semánticas (header, main, footer)?","choices":["Mejorar accesibilidad y SEO","Hacer que el CSS no funcione","Ocultar contenido","Solo por estética"],"answer":0},
  {"q":"¿Qué herramienta se usa para ver y depurar HTML/CSS en el navegador?","choices":["Terminal","DevTools (herramientas del desarrollador)","Bloc de notas","FTP"],"answer":1}
];

// ===== ESTADO =====
let questions = [];
let current = 0;
let answers = [];

const quizArea = document.getElementById('quiz-area');
const countEl = document.getElementById('count');
const resultsEl = document.getElementById('results');

// ===== FUNCIONES =====
function loadTest(n){
  if(n === 1) questions = test1;
  else if(n === 2) questions = test2;
  else questions = test3;
  answers = Array(questions.length).fill(undefined);
  current = 0;
  resultsEl.style.display = 'none';
  renderQuestion(0);
}

function renderQuestion(i){
  const q = questions[i];
  quizArea.innerHTML = '';

  // ===== Barajar respuestas =====
  const indexedChoices = q.choices.map((text,idx)=>({text,idx}));
  const shuffled = indexedChoices.sort(()=>Math.random()-0.5);

  const wrapper = document.createElement('div'); wrapper.className = 'question card';
  const title = document.createElement('div'); title.innerHTML = '<strong>Pregunta '+(i+1)+'.</strong> '+q.q; wrapper.appendChild(title);
  const choices = document.createElement('div'); choices.className = 'choices';

  shuffled.forEach((choiceObj,displayIdx)=>{
    const id='c_'+i+'_'+displayIdx;
    const label=document.createElement('label'); label.className='choice';
    const radio=document.createElement('input'); radio.type='radio'; radio.name='q'+i; radio.value=choiceObj.idx; radio.id=id;
    if(answers[i]===choiceObj.idx) radio.checked=true;
    const span=document.createElement('div'); span.innerText=String.fromCharCode(97+displayIdx)+')  '+choiceObj.text;
    label.appendChild(radio); label.appendChild(span);
    choices.appendChild(label);
  });

  wrapper.appendChild(choices);
  quizArea.appendChild(wrapper);
  countEl.innerText = questions.length;
}

function saveAnswer(i){
  const radios=document.getElementsByName('q'+i);
  for(const r of radios) if(r.checked){ answers[i]=parseInt(r.value); return }
  answers[i]=undefined;
}

function showResults(){
  saveAnswer(current);
  resultsEl.style.display='block';
  resultsEl.innerHTML='';
  let correct=0, wrong=0, empty=0;
  questions.forEach((q,idx)=>{
    const user=answers[idx];
    const ok=user===q.answer;
    if(user===undefined) empty++;
    else if(ok) correct++; else wrong++;
    const qdiv=document.createElement('div'); qdiv.className='question '+(user===undefined?'':(ok?'correct':'incorrect'));
    qdiv.innerHTML='<strong>Pregunta '+(idx+1)+' — '+(user===undefined? 'Sin responder' : (ok?'Correcta':'Incorrecta'))+'</strong><div style="margin-top:6px">Tu respuesta: '+(user===undefined?'<i>sin responder</i>':String.fromCharCode(97+user)+') '+q.choices[user])+'</div><div>Respuesta correcta: <strong>'+String.fromCharCode(97+q.answer)+') '+q.choices[q.answer]+'</strong></div>';
    resultsEl.appendChild(qdiv);
  });

  // Calificación "como en examen real" (0 a 10) con penalización: -1/3 por fallo
  const netCorrect = Math.max(0, correct - (wrong/3));
  const fraction = questions.length ? (netCorrect / questions.length) : 0;
  const grade = Math.round(fraction * 10 * 100) / 100; // redondeo a 2 decimales
  const percent = Math.round(fraction * 100 * 100) / 100;

  const summary=document.createElement('div'); summary.className='card'; summary.style.marginTop='10px';
  summary.innerHTML = '<div class="summary"><div class="chip">Aciertos: '+correct+'</div><div class="chip">Fallos: '+wrong+'</div><div class="chip">Sin responder: '+empty+'</div><div class="chip">Nota (0-10): '+grade+'</div><div class="chip">Porcentaje: '+percent+'%</div></div>';
  resultsEl.prepend(summary);
  window.scrollTo({top:0,behavior:'smooth'});
}

// ===== EVENTOS =====
document.getElementById('prevBtn').addEventListener('click',()=>{if(current>0){saveAnswer(current);current--;renderQuestion(current);}});
document.getElementById('nextBtn').addEventListener('click',()=>{if(current<questions.length-1){saveAnswer(current);current++;renderQuestion(current);}});
document.getElementById('finishBtn').addEventListener('click',showResults);
document.getElementById('restartBtn').addEventListener('click',()=>{loadTest(parseInt(document.getElementById('testSelector').value));});
quizArea.addEventListener('change',(e)=>{if(e.target&&e.target.type==='radio') saveAnswer(current);});
document.getElementById('testSelector').addEventListener('change',e=>{loadTest(parseInt(e.target.value));});
window.onload = ()=> loadTest(1);
</script>
</body>
</html>
